<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control Dashboard</title>
    
    <meta name="theme-color" content="#000432">
    <meta name="background-color" content="#000432">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Mission Control">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* 1. Core Reset & Layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000432; color: white; height: 100vh; width: 100vw;
            overflow: hidden; border: 1px solid white; font-family: 'Lexend Deca', sans-serif;
            display: grid; 
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 2.4vh; 
        }
            
        /* 2. Main Display & Navigation */
        .main-display {
            grid-column: 1 / 2; grid-row: 1 / 2;
            border-bottom: 1px solid white;
            position: relative; background-color: #000432;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }

        .bottom-bar { 
            grid-column: 1 / 2; grid-row: 2 / 3; 
            display: flex; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none;
        }
        .bottom-bar::-webkit-scrollbar { display: none; }
        #add-tab-btn { font-size: 1.2rem; cursor: pointer; min-width: 40px; }

        .tab-content { display: none; width: 100%; height: 100%; position: relative; align-items: center; justify-content: center; padding: 0; }
        .tab-content.active { display: flex; }

        /* 3. Grid Styling */
        .dynamic-grid { display: grid; gap: 3px; background-color: transparent; }
        
        .grid-item {
            background-color: #000432; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer; overflow: hidden; border: 1px solid #ff0000; color: #ff0000;
            font-weight: 700; text-align: center; font-size: clamp(7px, 1vw, 12px); outline: none;
        }
        
        .content-wrapper { pointer-events: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .content-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        
        .grid-item.completed { color: #00ff00; border-color: #00ff00; }
        .grid-item.completed::after { content: ''; position: absolute; inset: 0; border: 1px solid #00ff00; pointer-events: none; }
        .grid-item.swap-source { border: 2px solid #ffff00 !important; box-shadow: 0 0 10px #ffff00; }

        /* 4. Controls & Navigation Items */
        .bottom-controls-wrapper { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 25; }
        .controls-col { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 5px; z-index: 10; }
        .ctrl-btn {
            background: rgba(255,255,255,0.05); border: 1px solid white; color: white; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
            transition: 0.2s; font-size: 0.6rem; text-transform: uppercase; border-radius: 4px;
        }
        .ctrl-btn:hover { background: white; color: #000432; }
        .lock-btn { position: absolute; top: 10px; left: 10px; padding: 5px 10px; z-index: 30; }
        .lock-btn.locked { background: #ff0000; color: white; border-color: #ff0000; }
        .lock-btn.unlocked { background: transparent; color: #00ff00; border-color: #00ff00; }
        
        .nav-item { 
            display: flex; align-items: center; justify-content: center; border-right: 1px solid white; 
            font-size: clamp(0.5rem, 0.7vw, 0.65rem); font-weight: bold; text-transform: uppercase; cursor: pointer; 
            padding: 0 10px; text-align: center; white-space: nowrap; flex: 1 1 auto; min-width: fit-content;
        }
        .nav-item:last-child { border-right: none; }
        .nav-item.active { background-color: transparent; color: #00ffff; border: 1px solid #00ffff; }
        
        .btn-wide { width: 38px; height: 26px; }
        .btn-tall { width: 26px; height: 38px; }
        
        /* EXPLICIT EDIT BUTTONS (Corner Actions) */
        .action-overlay { display: none; }
        .grid-unlocked .grid-item .action-overlay { display: block; }
        .cell-btn {
            position: absolute; background: rgba(0, 4, 50, 0.85); border: 1px solid #00ffff;
            border-radius: 3px; width: 20px; height: 20px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 10px; color: white;
            opacity: 0.5; transition: 0.2s; z-index: 5;
        }
        .grid-unlocked .grid-item:hover .cell-btn { opacity: 1; transform: scale(1.1); }
        
        .btn-swap { top: 2px; left: 2px; }
        .btn-clear { top: 2px; right: 2px; border-color: #ff0000; }
        .btn-text { bottom: 2px; left: 2px; }
        .btn-upload { bottom: 2px; right: 2px; }

        /* Uploading Overlay */
        .uploading-overlay {
            position: absolute; inset: 0; background: rgba(0, 4, 50, 0.8);
            display: flex; align-items: center; justify-content: center;
            color: #00ffff; font-size: 0.7rem; font-weight: bold; z-index: 10;
        }
        .delete-tab-btn {
            position: absolute; top: 10px; right: 10px; padding: 5px 10px; z-index: 30;
            background: none; border: 1px solid #ff0000; color: #ff0000; cursor: pointer;
            font-size: 0.6rem; font-weight: bold; text-transform: uppercase; border-radius: 4px;
            transition: 0.2s;
        }
        .delete-tab-btn:hover { background: #ff0000; color: white; }
    </style>
</head>
<body>

    <div class="main-display"></div>

    <div class="bottom-bar" id="bottom-bar">
        <div class="nav-item" id="add-tab-btn">+</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const IMGBB_API_KEY = "c6cb2a9badd0a53af93636523c72211e";

        const firebaseConfig = {
            apiKey: "AIzaSyAYHA8Qw3Qw3Qzbyg8MtjrSKcJusNi4VaA6V4",
            authDomain: "system-data-bf026.firebaseapp.com",
            databaseURL: "https://system-data-bf026-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "system-data-bf026",
            storageBucket: "system-data-bf026.firebasestorage.app",
            messagingSenderId: "718302899022",
            appId: "1:718302899022:web:f1675dbcc293e138c68c1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const lockedStates = {};
        let swapSource = null;
        let targetCellForUpload = null; 

        // DYNAMIC FILE INPUT FOR UPLOADS
        const uploaderInput = document.createElement('input');
        uploaderInput.type = 'file';
        uploaderInput.accept = 'image/*';
        uploaderInput.style.display = 'none';
        document.body.appendChild(uploaderInput);

        uploaderInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file || !targetCellForUpload) return;

            const { appName, cellRef, cellEl } = targetCellForUpload;

            try {
                const overlay = document.createElement('div');
                overlay.className = 'uploading-overlay';
                overlay.innerText = 'SYNC...';
                cellEl.appendChild(overlay);

                const formData = new FormData();
                formData.append("image", file);

                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.success) {
                    update(cellRef, { text: data.data.url });
                } else {
                    throw new Error("ImgBB upload failed");
                }
                
            } catch (error) {
                console.error("Upload failed:", error);
                alert("Upload failed. Check console for details.");
            } finally {
                targetCellForUpload = null;
                uploaderInput.value = ''; 
                const overlay = cellEl.querySelector('.uploading-overlay');
                if (overlay) overlay.remove();
            }
        });

        window.toggleLock = (appName) => set(ref(db, `grids/${appName}/config/locked`), !lockedStates[appName]);

        window.changeSize = (appName, type, delta) => {
            if (lockedStates[appName]) return;
            const configRef = ref(db, `grids/${appName}/config`);
            onValue(configRef, (snap) => {
                let current = snap.val()?.[type] || 5;
                update(configRef, { [type]: Math.max(1, current + delta) });
            }, { onlyOnce: true });
        };

        window.resetActiveGrid = () => {
            const activeNav = document.querySelector('.nav-item.active');
            if (!activeNav) return;
            const activeId = activeNav.getAttribute('data-target').replace('content-', '');
            onValue(ref(db, `grids/${activeId}/data`), (snap) => {
                const data = snap.val(); if (!data) return;
                for (let key in data) update(ref(db, `grids/${activeId}/data/${key}`), { completed: false });
            }, { onlyOnce: true });
        };

        function renderContent(el, text) {
            const cleanText = text?.trim() || "";
            const isImage = 
                /\.(jpg|jpeg|png|webp|gif|svg|avif)($|\?)/i.test(cleanText) || 
                cleanText.includes("ibb.co") || 
                cleanText.startsWith("data:image/") ||
                cleanText.includes("gstatic.com/images") ||
                cleanText.includes("googleusercontent.com");

            if (isImage) {
                el.innerHTML = `<img src="${cleanText}" crossorigin="anonymous">`;
            } else { el.innerText = cleanText; }
        }

        function createCell(appName, id, container) {
            const cell = document.createElement('div');
            cell.className = 'grid-item';
            container.appendChild(cell);

            const contentDiv = document.createElement('div');
            contentDiv.className = 'content-wrapper';
            cell.appendChild(contentDiv);

            const actionOverlay = document.createElement('div');
            actionOverlay.className = 'action-overlay';
            
            const btnSwap  = document.createElement('button'); btnSwap.className  = 'cell-btn btn-swap';   btnSwap.innerHTML  = '🔄'; btnSwap.title  = 'Swap Box';
            const btnClear = document.createElement('button'); btnClear.className = 'cell-btn btn-clear';  btnClear.innerHTML = '❌'; btnClear.title = 'Clear Content';
            const btnText  = document.createElement('button'); btnText.className  = 'cell-btn btn-text';   btnText.innerHTML  = '📝'; btnText.title  = 'Edit Text';
            const btnUpload= document.createElement('button'); btnUpload.className= 'cell-btn btn-upload'; btnUpload.innerHTML= '📷'; btnUpload.title= 'Upload Image';
            
            actionOverlay.append(btnSwap, btnClear, btnText, btnUpload);
            cell.appendChild(actionOverlay);

            const cellRef = ref(db, `grids/${appName}/data/${id}`);
            onValue(cellRef, (snap) => {
                const val = snap.val() || { text: "", completed: false };
                renderContent(contentDiv, val.text);
                val.completed ? cell.classList.add('completed') : cell.classList.remove('completed');
            });

            btnUpload.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lockedStates[appName]) return;
                targetCellForUpload = { appName, id, cellRef, cellEl: cell };
                uploaderInput.click();
            });

            btnText.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lockedStates[appName]) return;
                let currentText = contentDiv.innerText || contentDiv.querySelector('img')?.src || "";
                let newText = prompt("Enter text or image URL:", currentText);
                if (newText !== null) update(cellRef, { text: newText });
            });

            btnSwap.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lockedStates[appName]) return;
                if (!swapSource) { 
                    swapSource = { id, element: cell }; 
                    cell.classList.add('swap-source'); 
                } else if (swapSource.id === id) { 
                    swapSource.element.classList.remove('swap-source'); 
                    swapSource = null; 
                } else {
                    const sRef = ref(db, `grids/${appName}/data/${swapSource.id}`);
                    const tRef = ref(db, `grids/${appName}/data/${id}`);
                    onValue(sRef, (s1) => { 
                        onValue(tRef, (s2) => { 
                            update(sRef, s2.val()); 
                            update(tRef, s1.val()); 
                        }, { onlyOnce: true }); 
                    }, { onlyOnce: true });
                    swapSource.element.classList.remove('swap-source'); 
                    swapSource = null;
                }
            });

            btnClear.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lockedStates[appName]) return;
                update(cellRef, { text: "", completed: false });
            });

            cell.addEventListener('click', () => {
                update(cellRef, { completed: !cell.classList.contains('completed') });
            });
        }

        function initApp(appName) {
            const container = document.getElementById(`grid-${appName}`);
            const lockBtn   = document.getElementById(`lock-${appName}`);
            const ctrls     = document.querySelectorAll(`.grid-ctrls-${appName}`);
            
            onValue(ref(db, `grids/${appName}/config`), (snap) => {
                const config = snap.val() || { rows: 5, cols: 5, locked: false };
                lockedStates[appName] = config.locked;
                lockBtn.innerText    = config.locked ? "Locked" : "Unlock";
                lockBtn.className    = `ctrl-btn lock-btn ${config.locked ? 'locked' : 'unlocked'}`;
                ctrls.forEach(c => c.style.display = config.locked ? 'none' : 'flex');
                
                if (lockedStates[appName]) container.classList.remove('grid-unlocked');
                else container.classList.add('grid-unlocked');
                
                const gap = 3;
                const mainDisplayHeight = window.innerHeight * (1 - 0.024);
                const mainDisplayWidth  = window.innerWidth;
                
                const maxCellW = (mainDisplayWidth  - (config.cols - 1) * gap) / config.cols;
                const maxCellH = (mainDisplayHeight - (config.rows - 1) * gap) / config.rows;
                const cellSize = Math.floor(Math.min(maxCellW, maxCellH));
                
                container.style.width               = `${(cellSize * config.cols) + ((config.cols - 1) * gap)}px`;
                container.style.height              = `${(cellSize * config.rows) + ((config.rows - 1) * gap)}px`;
                container.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
                container.style.gridTemplateRows    = `repeat(${config.rows}, 1fr)`; 
                
                container.innerHTML = '';
                for (let i = 0; i < config.rows * config.cols; i++) {
                    createCell(appName, `${Math.floor(i / config.cols)}_${i % config.cols}`, container);
                }
            });
        }

        // Track active grid-based tabs so resize re-initialises them
        const activeGridTabs = new Set();

        window.addEventListener('resize', () => {
            activeGridTabs.forEach(name => initApp(name));
        });

        window.addNewTabPrompt = () => {
            var name = prompt("Enter Tab Name:");
            if (!name) return;
            var url = prompt("Enter GitHub Pages URL (leave blank for a grid tab):");
            var tabId = 'custom_' + Date.now();
            set(ref(db, `customTabs/${tabId}`), { name, url: url || "" });
        };
        
        window.bindNavListeners = () => {
            document.querySelectorAll('.nav-item').forEach(tab => {
                tab.onclick = () => {
                    if (tab.id === 'add-tab-btn') { addNewTabPrompt(); return; }
                    document.querySelectorAll('.nav-item, .tab-content').forEach(el => el.classList.remove('active'));
                    tab.classList.add('active');
                    var targetEl = document.getElementById(tab.dataset.target);
                    if (targetEl) targetEl.classList.add('active');
                };
            });
        };
        
        onValue(ref(db, 'customTabs'), (snap) => {
            var tabs = snap.val();
            document.querySelectorAll('.custom-nav-item, .custom-tab-content').forEach(el => el.remove());
            activeGridTabs.clear();
            
            if (tabs) {
                var bottomBar   = document.querySelector('#bottom-bar');
                var mainDisplay = document.querySelector('.main-display');
                var addBtn      = document.getElementById('add-tab-btn');
                var firstNav    = null;
                
                Object.keys(tabs).forEach(key => {
                    var t = tabs[key];
                    var contentId = `content-${key}`;
                    
                    var nav = document.createElement('div');
                    nav.className    = 'nav-item custom-nav-item';
                    nav.dataset.target = contentId;
                    nav.innerText    = t.name;
                    bottomBar.insertBefore(nav, addBtn);
                    if (!firstNav) firstNav = nav;
                    
                    var content = document.createElement('div');
                    content.className = 'tab-content custom-tab-content';
                    content.id        = contentId;

                    var deleteBtn = document.createElement('button');
                    deleteBtn.className = 'delete-tab-btn';
                    deleteBtn.innerText = '✕ Delete Tab';
                    deleteBtn.onclick = () => {
                        if (confirm(`Permanently delete "${t.name}"?`)) {
                            set(ref(db, `customTabs/${key}`), null);
                        }
                    };

                    if (t.url) {
                        // URL-based tab → iframe
                        content.innerHTML = `<iframe src="${t.url}" style="width:100%;height:100%;border:none;display:block;overflow:hidden;" allow="autoplay"></iframe>`;
                    } else {
                        // Grid-based tab
                        const appName = key;
                        activeGridTabs.add(appName);
                        lockedStates[appName] = false;

                        content.innerHTML = `
                            <button class="ctrl-btn lock-btn unlocked" id="lock-${appName}" onclick="toggleLock('${appName}')">Unlock</button>
                            <div id="grid-${appName}" class="dynamic-grid"></div>
                            <div class="bottom-controls-wrapper">
                                <div class="grid-ctrls-${appName}" style="display:flex;gap:5px;">
                                    <button class="ctrl-btn btn-wide" onclick="changeSize('${appName}','rows',1)">+</button>
                                    <button class="ctrl-btn btn-wide" onclick="changeSize('${appName}','rows',-1)">-</button>
                                </div>
                            </div>
                            <div class="controls-col grid-ctrls-${appName}">
                                <button class="ctrl-btn btn-tall" onclick="changeSize('${appName}','cols',1)">+</button>
                                <button class="ctrl-btn btn-tall" onclick="changeSize('${appName}','cols',-1)">-</button>
                            </div>`;
                    }

                    content.appendChild(deleteBtn);
                    mainDisplay.appendChild(content);

                    // Init grid after DOM is in place
                    if (!t.url) {
                        requestAnimationFrame(() => initApp(key));
                    }
                });

                // Activate first tab if nothing is active
                if (!document.querySelector('.nav-item.active:not(#add-tab-btn)') && firstNav) {
                    firstNav.classList.add('active');
                    document.getElementById(firstNav.dataset.target)?.classList.add('active');
                }
            }
            bindNavListeners();
        });
        
        bindNavListeners();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { 
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW reg failed:', err)); 
            });
        }
    </script>
</body>
</html>
